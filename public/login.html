<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Santiago Estruturas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f9; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .logo-img { width: 80px; height: auto; margin-bottom: 10px; }
        .empresa-nome { margin: 0; color: #2c3e50; font-size: 1.2em; font-weight: bold; }
        .titulo { color: #666; font-size: 1em; margin-bottom: 30px; margin-top: 5px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;}
        button:hover { background-color: #1a252f; }
        #mensagemErro { color: red; font-size: 0.9em; display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
        <p class="empresa-nome">Santiago Estruturas Metálicas</p>
        <p class="titulo">Controle de Faltas</p>

        <input type="text" id="username" placeholder="Usuário">
        <input type="password" id="password" placeholder="Senha">
        <button onclick="fazerLogin()">Entrar no Sistema</button>
        <div id="mensagemErro">Usuário ou senha incorretos.</div>
    </div>

    <script>
        async function fazerLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msgErro = document.getElementById('mensagemErro');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                window.location.href = 'index.html';
            } else {
                msgErro.style.display = 'block';
            }
        }
        
        // Permite logar apertando 'Enter'
        document.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
